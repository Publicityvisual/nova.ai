# GitHub Actions - Auto Deploy to Cloudflare Workers
# Repo: https://github.com/Publicityvisual/nova.ai

name: Deploy Nova.AI to Cloudflare

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Wrangler
      run: npm install -g wrangler
      
    - name: Create KV Namespace (if not exists)
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      run: |
        echo "Setting up KV for Nova..."
        # Try to create KV, ignore if exists
        wrangler kv:namespace create "SOFIA_KV" --env production 2>/dev/null || true
        echo "KV setup complete"
        
    - name: Deploy to Cloudflare Workers
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      run: |
        echo "Deploying Nova.AI..."
        DEPLOY_OUTPUT=$(wrangler deploy --env production 2>&1)
        echo "$DEPLOY_OUTPUT"
        
        # Extract worker URL
        WORKER_URL=$(echo "$DEPLOYLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9\-\.]+\.workers\.dev' | head -1)
        echo "WORKER_URL=$WORKER_URL" >> $GITHUB_ENV
        echo "Deployed to: $WORKER_URL"
        
    - name: Setup Telegram Webhook
      if: env.WORKER_URL != ''
      run: |
        WEBHOOK_URL="${{ env.WORKER_URL }}/webhook"
        echo "Setting up webhook: $WEBHOOK_URL"
        TELEGRAM_TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
        
        # Delete old webhook first
        curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/deleteWebhook"
        
        # Set new webhook
        RESPONSE=$(curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/setWebhook?url=${WEBHOOK_URL}")
        echo "Telegram response: $RESPONSE"
        
    - name: Deployment Summary
      run: |
        echo "✅ Deployment Complete!"
        echo "Worker URL: ${{ env.WORKER_URL }}"
        echo "Status: Check ${{ env.WORKER_URL }} for health status"
        
    - name: Comment on Commit
      if: github.event_name == 'push'
      uses: actions/github-script@v7
      with:
        script: |
          const sha = context.sha;
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: sha,
            body: `🚀 **Nova.AI Deployed!**\n\nWorker: ${{ env.WORKER_URL }}\nWebhook: ✅ Configured\nStatus: ${{ env.WORKER_URL }}/dashboard`
          });
