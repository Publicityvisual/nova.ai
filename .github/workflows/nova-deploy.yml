# 🚀 GitHub Actions - NOVA AI Deploy to Render
# Único workflow oficial - Deploy automático a Render.com

name: NOVA AI Deploy

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:  # Permite ejecución manual

# Prevenir ejecuciones concurrentes
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Tests y validación
  test:
    runs-on: ubuntu-latest
    name: 🧪 Tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Professional Check
      run: node scripts/professional-check.js
      continue-on-error: true
      
    - name: Test syntax
      run: |
        echo "Testing core files..."
        node -c src/core/ultra-master.js || echo "Warning: ultra-master.js"
        node -c src/core/saas-engine.js || echo "Warning: saas-engine.js"
        echo "✅ Syntax OK"
        
    - name: Check environment variables
      run: |
        echo "Checking required env vars..."
        if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
          echo "⚠️ RENDER_DEPLOY_HOOK not set"
        else
          echo "✅ RENDER_DEPLOY_HOOK configured"
        fi

  # Job 2: Deploy a Render (único deploy activo)
  deploy-render:
    needs: test
    runs-on: ubuntu-latest
    name: 🚀 Deploy to Render
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to Render
      env:
        RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        if [ -z "$RENDER_DEPLOY_HOOK" ]; then
          echo "❌ RENDER_DEPLOY_HOOK not configured"
          echo "Por favor configura el secret en GitHub: Settings > Secrets > Actions"
          exit 1
        fi
        
        echo "🚀 Triggering Render deploy..."
        curl -X POST "$RENDER_DEPLOY_HOOK"
        echo "✅ Deploy triggered successfully"
        
    - name: Wait for deploy
      run: |
        echo "⏳ Esperando deploy (30s)..."
        sleep 30
        echo "✅ Deploy should be complete now"
        
    - name: Verify deploy
      env:
        RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
      run: |
        if [ ! -z "$RENDER_SERVICE_URL" ]; then
          echo "Checking health endpoint..."
          curl -s "$RENDER_SERVICE_URL/health" || echo "Health check skipped"
        fi
        
  # Job 3: Notificación (solo si todo OK)
  notify:
    needs: [test, deploy-render]
    runs-on: ubuntu-latest
    name: 📢 Notify
    if: success()
    
    steps:
    - name: Success notification
      run: |
        echo "🎉 DEPLOY EXITOSO"
        echo "=================="
        echo "Branch: ${{ github.ref }}"
        echo "Commit: ${{ github.sha }}"
        echo "Autor: ${{ github.actor }}"
        echo "Fecha: $(date)"
        echo ""
        echo "✅ Tests pasaron"
        echo "✅ Deploy a Render completado"
        echo ""
        echo "Sistema activo en: https://nova-ai-pro.onrender.com"
