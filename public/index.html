<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; max-width: 600px; padding: 2rem; }
    h1 { font-size: 3rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
    p { color: #888; font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem; }
    .status { display: inline-block; padding: 0.5rem 1.5rem; border: 1px solid #333; border-radius: 50px; color: #4ade80; font-size: 0.9rem; }
    .status::before { content: ''; display: inline-block; width: 8px; height: 8px; background: #4ade80; border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nova AI</h1>
    <p>Asistente inteligente para tu negocio.<br>WhatsApp y Telegram, 24/7.</p>
    <div class="status">Online</div>
  </div>
</body>
</html>
