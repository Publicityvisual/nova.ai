name: novaai-bot
services:
  - name: novaai-api
    type: web
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    healthcheck:
      path: /api/status
      interval: 30s
      timeout: 10s
    env:
      - name: NODE_ENV
        value: production
      - name: PORT
        value: "3000"
      - name: ANTHROPIC_AUTH_TOKEN
        sync: false  # Se configura en Railway dashboard
      - name: OPENROUTER_API_KEY
        sync: false
      - name: SERPAPI_KEY
        sync: false
      - name: WEATHER_API_KEY
        sync: false
      - name: SMTP_HOST
        value: smtp.gmail.com
      - name: SMTP_PORT
        value: "587"
      - name: SMTP_USER
        sync: false
      - name: SMTP_PASS
        sync: false
    volumes:
      - path: /app/auth_info_baileys
        name: whatsapp-auth
    restart:
      policy: on-failure
      maxRetries: 10
