services:
  - type: web
    name: novaai-bot
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ANTHROPIC_AUTH_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
    healthCheckPath: /api/status
    autoDeploy: true
